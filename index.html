<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Order Summary Card</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex justify-center items-center relative overflow-hidden">
<img src="/order-summary-component-main/images/pattern-background-desktop.svg" class="absolute top-0 left-0 w-full">
<div class="bg-white w-[350px] rounded-3xl overflow-hidden relative z-10 ">
  <img src="/order-summary-component-main/images/illustration-hero.svg" class="w-full">
  <div class="p-6 text-center">
    <h1 class="text-2xl font-bold text-blue-950 mb-4">Order Summary</h1>
    <p class="text-gray-500 text-sm leading-6 mb-6">You can now listen to million of songs, audiobooks, andpodcasts on any device anywhere you like!</p>
    <div class="bg-slate-300 rounded-xl flex items-center justify-between p-4 mb-6">
      <div class="flex items-center gap-4">
        <img src="/order-summary-component-main/images/icon-music.svg" class="w-10 h-10">
        <div class="text-left">
          <p class="font-bold text-sm">Annual Plan</p>  
          <p class="text-gray-500 text-sm">$59.99/year</p>
        </div>
      </div>
      <a href="#" class="text-blue-700 text-sm font-bold underline hover:text-blue-500">Change</a>
    </div>
    <button class="w-full bg-indigo-900 text-white py-3 rounded-xl font-bold shadow-lg cursor-pointer mb-6">Proceed to Payment</button>
    <p class="text-gray-500 font-bold text-sm cursor-pointer">Cancel Order</p>
  </div>
</div>
</body>
</html>
